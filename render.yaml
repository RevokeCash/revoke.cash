services:
  - type: pserv
    name: indexer-manager
    runtime: docker
    repo: https://github.com/RevokeCash/revoke-private
    branch: auto-revoke-executor
    dockerfilePath: ./apps/indexer/Dockerfile
    dockerContext: .
    region: virginia
    plan: starter
    numInstances: 1
    envVars:
      - key: IS_MANAGER
        value: 'true'
      - key: PORT
        value: '3001'
      - key: NEON_USE_WEBSOCKET
        value: 'true'
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: BULL_BOARD_USER
        sync: false
      - key: BULL_BOARD_PASSWORD
        sync: false
      - key: EXPLOIT_WEBHOOK_TOKEN
        sync: false

  - type: pserv
    name: indexer-worker
    runtime: docker
    repo: https://github.com/RevokeCash/revoke-private
    branch: auto-revoke-executor
    dockerfilePath: ./apps/indexer/Dockerfile
    dockerContext: .
    region: virginia
    plan: standard
    scaling:
      minInstances: 1
      maxInstances: 8
      targetCPUPercent: 75
      targetMemoryPercent: 75
    envVars:
      - key: PORT
        value: '3002'
      - key: NEON_USE_WEBSOCKET
        value: 'true'
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
